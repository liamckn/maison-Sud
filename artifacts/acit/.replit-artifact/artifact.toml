kind = "web"
previewPath = "/"
title = "ACIT — L'Été Est Un État d'Esprit"
version = "1.0.0"
id = "artifacts/acit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22167

[services.development]
run = "pnpm --filter @workspace/acit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/acit", "run", "build" ]
publicDir = "artifacts/acit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22167"
BASE_PATH = "/"
